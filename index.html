<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="./favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="My Magic: The Gathering card collection" />
    <meta name="theme-color" content="#6366f1" />
    <link rel="manifest" href="./manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MTG Collection">
    <!-- Best-effort hints: tell well-behaved browsers and intermediate
         caches to revalidate this HTML on every load. GitHub Pages
         cannot set real HTTP cache headers, so we pair these with a
         runtime version check (see purgeServiceWorker / checkForUpdate
         in src/main.tsx) that reloads when a newer bundle is deployed. -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Magic Card Collection</title>
    <script>
      // Pre-paint theme: read stored preference, fall back to system.
      // Runs synchronously before React mounts to avoid a light/dark flash.
      (function () {
        try {
          var stored = localStorage.getItem('mc-theme')
          var theme = stored === 'light' || stored === 'dark'
            ? stored
            : (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark')
          document.documentElement.setAttribute('data-theme', theme)
        } catch (_) {
          document.documentElement.setAttribute('data-theme', 'dark')
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
